    <main>
        <h1>
            <strong>
            SEJA UM APOIADOR BIOME
            </strong>
        </h1> 
        <section>
        <form action="/">
            <fieldset>
                <label for="nome">
                    Nome Completo / Razão Social: 
                <br>
                <input type="text" placeholder="   Digite seu nome completo  " id="nome" name="username">
                </label>
            </fieldset>
            <fieldset>
                <label for="documento">
                    CPF / CNPJ: 
                <br>
                <input type="number"  placeholder=" Digite seu documento  " id="documento" name="doc">
                </label>
            </fieldset>
            <fieldset>
                <label for="contato">
                    DDD + Celular
                <br>
                <input type="tel" placeholder=" Telefone para contato " id="contato" name="contact" >
                </label>
            </fieldset>
            <fieldset>
                <label for="email">
                    E-mail:
                <br>
                <input type="email" placeholder=" Seu melhor E-mail: " id="email" name="mailto">
                </label>
            </fieldset>
            <fieldset>
                <label for="cidade">
                    Cidade: 
                <br>
                <input type="text" placeholder="Informe sua cidade" id="cidade" name="city" >
                </label>
            </fieldset>
                <br>
                <button type="submit">
                    ENVIAR
                </button>
            </form>
        </section>
